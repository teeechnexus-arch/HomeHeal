{% extends "base.html" %}
{% block title %}Login – HomeHeal{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="logo-icon">🏥</div>
      Home<span style="color:var(--primary)">Heal</span>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your HomeHeal account</p>

    <form method="POST" action="{{ url_for('login') }}" id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-icon-wrap">
          <i class="ph ph-envelope icon"></i>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-icon-wrap">
          <i class="ph ph-lock icon"></i>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Your password" required autocomplete="current-password" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-2" id="login-submit">
        <i class="ph ph-sign-in"></i> Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <div class="auth-link">
      Don't have an account? <a href="{{ url_for('register') }}">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
